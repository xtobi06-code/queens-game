// ── Puzzle generation (real functions; also stringified for the worker) ───────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function genSol(n){
  for(let a=0;a<3000;a++){
    const c=shuffle([...Array(n).keys()]);let v=true;
    for(let i=0;i<n&&v;i++)for(let j=i+1;j<n;j++)if(Math.abs(c[i]-c[j])<=1&&Math.abs(i-j)<=1){v=false;break;}
    if(v)return c;
  }return null;
}

function grow(n,sol){
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  const grid=Array.from({length:n},()=>Array(n).fill(-1));
  const sizes=Array(n).fill(1);
  for(let r=0;r<n;r++)grid[r][sol[r]]=r;
  let rem=n*n-n;
  const tg=Array(n).fill(0).map(()=>{const x=Math.random();if(x<0.25)return 1+Math.floor(Math.random()*4);if(x<0.55)return 4+Math.floor(Math.random()*4);if(x<0.85)return 7+Math.floor(Math.random()*5);return 11+Math.floor(Math.random()*6);});
  while(rem>0){
    const cand=[];
    for(let r=0;r<n;r++){const f=[];for(let row=0;row<n;row++)for(let col=0;col<n;col++){if(grid[row][col]!==r)continue;for(const[dr,dc]of dirs){const nr=row+dr,nc=col+dc;if(nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]===-1)f.push([nr,nc]);}}if(f.length)cand.push({r,f});}
    if(!cand.length)break;
    const h=cand.filter(c=>sizes[c.r]<tg[c.r]);const pool=h.length?h:cand;
    let pk;
    if(h.length){const w=pool.map(c=>Math.max(1,tg[c.r]-sizes[c.r]));const t=w.reduce((a,b)=>a+b,0);let rnd=Math.random()*t;pk=pool[0];for(let i=0;i<pool.length;i++){rnd-=w[i];if(rnd<=0){pk=pool[i];break;}}}
    else pk=pool[Math.floor(Math.random()*pool.length)];
    const[pr,pc]=pk.f[Math.floor(Math.random()*pk.f.length)];
    grid[pr][pc]=pk.r;sizes[pk.r]++;rem--;
  }
  if(rem>0){let p=0;while(rem>0&&p<n*n){p++;for(let row=0;row<n&&rem>0;row++)for(let col=0;col<n&&rem>0;col++){if(grid[row][col]!==-1)continue;for(const[dr,dc]of dirs){const nr=row+dr,nc=col+dc;if(nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]!==-1){grid[row][col]=grid[nr][nc];sizes[grid[nr][nc]]++;rem--;break;}}}}}
  return grid;
}

function solvePuzzle(n,regions,limit,fixed){
  fixed=fixed||{};
  const sols=[];const cu=Array(n).fill(false);const ru=Array(n).fill(false);const pl=Array(n).fill(-1);
  function rec(row){if(sols.length>=limit)return;if(row===n){sols.push([...pl]);return;}
    const fc=fixed[row];
    for(let col=0;col<n;col++){if(fc!==undefined&&col!==fc)continue;if(cu[col])continue;const rg=regions[row][col];if(ru[rg])continue;if(row>0&&pl[row-1]!==-1&&Math.abs(pl[row-1]-col)<=1)continue;cu[col]=true;ru[rg]=true;pl[row]=col;rec(row+1);cu[col]=false;ru[rg]=false;pl[row]=-1;if(sols.length>=limit)return;}}
  rec(0);return sols;
}

function isConn(n,grid,r){
  const cells=[];for(let row=0;row<n;row++)for(let col=0;col<n;col++)if(grid[row][col]===r)cells.push([row,col]);
  if(!cells.length)return false;
  const seen=new Set([cells[0][0]*n+cells[0][1]]);const st=[cells[0]];const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  while(st.length){const[cr,cc]=st.pop();for(const[dr,dc]of dirs){const nr=cr+dr,nc=cc+dc;if(nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]===r&&!seen.has(nr*n+nc)){seen.add(nr*n+nc);st.push([nr,nc]);}}}
  return seen.size===cells.length;
}

function refine(n,grid,target,deadline){
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];let stale=0;
  const tryMove=(row,col)=>{
    const curReg=grid[row][col];
    const neigh=shuffle(dirs.map(([dr,dc])=>[row+dr,col+dc]).filter(([nr,nc])=>nr>=0&&nr<n&&nc>=0&&nc<n&&grid[nr][nc]!==curReg));
    for(const[nr,nc]of neigh){const nr2=grid[nr][nc];grid[row][col]=nr2;let ok=true;for(let tr=0;tr<n;tr++)if(grid[tr][target[tr]]!==tr){ok=false;break;}if(ok&&isConn(n,grid,curReg)&&isConn(n,grid,nr2))return true;grid[row][col]=curReg;}
    return false;
  };
  while(Date.now()<deadline){
    const sols=solvePuzzle(n,grid,2);if(sols.length<=1)return true;
    const alt=sols.find(s=>s.some((c,r)=>c!==target[r]));if(!alt)return true;
    const diffs=shuffle([...Array(n).keys()].filter(r=>alt[r]!==target[r]));
    let moved=false;for(const row of diffs)if(tryMove(row,alt[row])){moved=true;break;}
    if(!moved){stale++;for(let t=0;t<25;t++){const row=Math.floor(Math.random()*n),col=Math.floor(Math.random()*n);if(target[row]===col)continue;if(tryMove(row,col))break;}if(stale>n*4)break;}
    else stale=0;
  }
  return solvePuzzle(n,grid,2).length===1;
}

function diffScore(n,regions){
  const placed=Array(n).fill(-1);const colUsed=Array(n).fill(false);const regUsed=Array(n).fill(false);
  const canPlace=(row,col)=>{if(placed[row]!==-1||colUsed[col]||regUsed[regions[row][col]])return false;for(let r2=0;r2<n;r2++)if(placed[r2]!==-1&&Math.abs(r2-row)<=1&&Math.abs(placed[r2]-col)<=1)return false;return true;};
  const place=(row,col)=>{placed[row]=col;colUsed[col]=true;regUsed[regions[row][col]]=true;};
  let depth=0,changed=true;
  while(changed){changed=false;depth++;
    for(let row=0;row<n;row++){if(placed[row]!==-1)continue;const v=[];for(let c=0;c<n;c++)if(canPlace(row,c))v.push(c);if(v.length===1){place(row,v[0]);changed=true;}}
    for(let col=0;col<n;col++){if(colUsed[col])continue;const v=[];for(let r=0;r<n;r++)if(canPlace(r,col))v.push(r);if(v.length===1){place(v[0],col);changed=true;}}
    for(let reg=0;reg<n;reg++){if(regUsed[reg])continue;const v=[];for(let r=0;r<n;r++){if(placed[r]!==-1)continue;for(let c=0;c<n;c++)if(regions[r][c]===reg&&canPlace(r,c)){v.push(r);break;}}if(v.length===1){const r=v[0];for(let c=0;c<n;c++)if(regions[r][c]===reg&&canPlace(r,c)){place(r,c);changed=true;break;}}}
  }
  return placed.filter(x=>x===-1).length*15+depth;
}

function genCandidate(n){
  const budget=n<=7?400:n<=9?800:1600;
  const deadline=Date.now()+9000;
  while(Date.now()<deadline){
    const sol=genSol(n);if(!sol)continue;
    const g=grow(n,sol);
    if(refine(n,g,sol,Date.now()+budget))return{regions:g,solution:sol,score:diffScore(n,g)};
  }
  return null;
}

// Logic solver: returns 'solved' (pure logic) or 'stuck' (needs backtracking)
function logicSolve(n,regions){
  const possible=Array.from({length:n},()=>Array(n).fill(true));
  const placed=Array(n).fill(-1);
  const colUsed=Array(n).fill(false);
  const regUsed=Array(n).fill(false);
  const elim=(r,c)=>{if(possible[r][c]){possible[r][c]=false;return true;}return false;};
  const place=(row,col)=>{
    if(placed[row]!==-1)return;
    placed[row]=col;colUsed[col]=true;regUsed[regions[row][col]]=true;
    for(let c2=0;c2<n;c2++)if(c2!==col)elim(row,c2);
    for(let r2=0;r2<n;r2++)if(r2!==row)elim(r2,col);
    for(let r2=0;r2<n;r2++)for(let c2=0;c2<n;c2++)
      if(regions[r2][c2]===regions[row][col]&&!(r2===row&&c2===col))elim(r2,c2);
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;
      const nr=row+dr,nc=col+dc;
      if(nr>=0&&nr<n&&nc>=0&&nc<n)elim(nr,nc);
    }
  };
  const combo=(arr,k)=>{if(k===0)return[[]];return arr.flatMap((v,i)=>combo(arr.slice(i+1),k-1).map(c=>[v,...c]));};
  let changed=true;
  while(changed){
    changed=false;
    // Singles: row, col, region
    for(let r=0;r<n;r++){
      if(placed[r]!==-1)continue;
      const cands=[];for(let c=0;c<n;c++)if(possible[r][c])cands.push(c);
      if(!cands.length)return'stuck';
      if(cands.length===1){place(r,cands[0]);changed=true;}
    }
    for(let c=0;c<n;c++){
      if(colUsed[c])continue;
      const cands=[];for(let r=0;r<n;r++)if(possible[r][c])cands.push(r);
      if(!cands.length)return'stuck';
      if(cands.length===1){place(cands[0],c);changed=true;}
    }
    for(let reg=0;reg<n;reg++){
      if(regUsed[reg])continue;
      const cells=[];for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(regions[r][c]===reg&&possible[r][c])cells.push([r,c]);
      if(!cells.length)return'stuck';
      if(cells.length===1){place(cells[0][0],cells[0][1]);changed=true;}
    }
    if(changed)continue;
    // Adjacency dominance: if every remaining candidate of a region/row/col would
    // attack a given empty cell, that cell can never hold a queen → eliminate it.
    const candCellsRegion=(reg)=>{const a=[];for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(regions[r][c]===reg&&possible[r][c])a.push([r,c]);return a;};
    const candCellsRow=(row)=>{const a=[];for(let c=0;c<n;c++)if(possible[row][c])a.push([row,c]);return a;};
    const candCellsCol=(col)=>{const a=[];for(let r=0;r<n;r++)if(possible[r][col])a.push([r,col]);return a;};
    const attacks=(qr,qc,r,c)=>{
      if(qr===r&&qc===c)return false;
      if(qr===r||qc===c)return true;
      if(Math.abs(qr-r)<=1&&Math.abs(qc-c)<=1)return true;
      return false;
    };
    const applyDominance=(cands)=>{
      if(cands.length<1)return;
      for(let r=0;r<n;r++)for(let c=0;c<n;c++){
        if(!possible[r][c])continue;
        if(cands.some(([qr,qc])=>qr===r&&qc===c))continue;
        if(cands.every(([qr,qc])=>attacks(qr,qc,r,c))){
          if(elim(r,c))changed=true;
        }
      }
    };
    for(let reg=0;reg<n&&!changed;reg++)if(!regUsed[reg])applyDominance(candCellsRegion(reg));
    for(let row=0;row<n&&!changed;row++)if(placed[row]===-1)applyDominance(candCellsRow(row));
    for(let col=0;col<n&&!changed;col++)if(!colUsed[col])applyDominance(candCellsCol(col));
    if(changed)continue;
    // Region confined to a single row or column → clear other regions there
    for(let reg=0;reg<n;reg++){
      if(regUsed[reg])continue;
      const cells=[];for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(regions[r][c]===reg&&possible[r][c])cells.push([r,c]);
      const rows=new Set(cells.map(x=>x[0])),cols=new Set(cells.map(x=>x[1]));
      if(rows.size===1){const rr=cells[0][0];for(let c=0;c<n;c++)if(regions[rr][c]!==reg&&elim(rr,c))changed=true;}
      if(cols.size===1){const cc=cells[0][1];for(let r=0;r<n;r++)if(regions[r][cc]!==reg&&elim(r,cc))changed=true;}
    }
    if(changed)continue;
    // Naked sets — both directions, size 2..3
    const unplacedRegs=[];for(let reg=0;reg<n;reg++)if(!regUsed[reg])unplacedRegs.push(reg);
    const freeRows=[];for(let r=0;r<n;r++)if(placed[r]===-1)freeRows.push(r);
    const freeCols=[];for(let c=0;c<n;c++)if(!colUsed[c])freeCols.push(c);
    const maxSize=Math.min(3,unplacedRegs.length-1);
    for(let size=2;size<=maxSize&&!changed;size++){
      // (a) N regions occupy exactly N rows/cols → clear other regions from those lines
      for(const regSet of combo(unplacedRegs,size)){
        const rows=new Set(),cols=new Set();
        for(const reg of regSet)for(let r=0;r<n;r++)for(let c=0;c<n;c++)
          if(regions[r][c]===reg&&possible[r][c]){rows.add(r);cols.add(c);}
        if(rows.size===size)
          for(const row of rows)for(let c=0;c<n;c++)
            if(possible[row][c]&&!regSet.includes(regions[row][c])&&!regUsed[regions[row][c]])if(elim(row,c))changed=true;
        if(cols.size===size)
          for(const col of cols)for(let r=0;r<n;r++)
            if(possible[r][col]&&!regSet.includes(regions[r][col])&&!regUsed[regions[r][col]])if(elim(r,col))changed=true;
        if(changed)break;
      }
      if(changed)break;
      // (b) N rows contain only N regions → confine those regions to these rows
      for(const rowSet of combo(freeRows,size)){
        const regs=new Set();
        for(const row of rowSet)for(let c=0;c<n;c++)if(possible[row][c])regs.add(regions[row][c]);
        if(regs.size===size)
          for(let r=0;r<n;r++){
            if(rowSet.includes(r))continue;
            for(let c=0;c<n;c++)
              if(possible[r][c]&&regs.has(regions[r][c])&&!regUsed[regions[r][c]])if(elim(r,c))changed=true;
          }
        if(changed)break;
      }
      if(changed)break;
      // (c) N cols contain only N regions → confine those regions to these cols
      for(const colSet of combo(freeCols,size)){
        const regs=new Set();
        for(const col of colSet)for(let r=0;r<n;r++)if(possible[r][col])regs.add(regions[r][col]);
        if(regs.size===size)
          for(let c=0;c<n;c++){
            if(colSet.includes(c))continue;
            for(let r=0;r<n;r++)
              if(possible[r][c]&&regs.has(regions[r][c])&&!regUsed[regions[r][c]])if(elim(r,c))changed=true;
          }
        if(changed)break;
      }
    }
  }
  return placed.every(p=>p!==-1)?'solved':'stuck';
}

function generatePuzzle(n, diffKey, extreme){
  const isExtreme=extreme&&diffKey==='hard';
  const count=isExtreme?(n<=9?3:2):(n<=7?4:n<=9?4:3);
  const overall=Date.now()+(isExtreme?(n>=11?30000:22000):(n>=11?10000:7000));
  const candidates=[];
  while(candidates.length<count&&Date.now()<overall){
    const c=genCandidate(n);
    if(!c)continue;
    // In extreme mode, only keep puzzles that need backtracking (our strong solver gets stuck)
    if(isExtreme&&logicSolve(n,c.regions)==='solved')continue;
    candidates.push(c);
  }
  if(!candidates.length)return null;
  candidates.sort((a,b)=>a.score-b.score);
  if(diffKey==='easy')return{n,...candidates[0]};
  return{n,...candidates[candidates.length-1]};
}

// Worker source = all generation functions stringified + message handler
const WORKER_SRC=[shuffle,genSol,grow,solvePuzzle,isConn,refine,diffScore,genCandidate,generatePuzzle]
  .map(f=>f.toString()).join('\n')+`
self.onmessage=function(e){
  self.postMessage({ready:true});
  const {n,diffKey,extreme}=e.data;
  const p=generatePuzzle(n,diffKey,extreme);
  self.postMessage({puzzle:p});
};
`;

// ── Seed encoding for challenge links ────────────────────────────────────────
// Encode regions grid as base64-ish string for URL param
function encodeGrid(n, regions){
  // pack each cell as nibble (max n=11 < 16)
  const bytes=[];
  let buf=0,bits=0;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){buf=(buf<<4)|regions[r][c];bits+=4;if(bits===8){bytes.push(buf&0xff);buf=0;bits=0;}}
  if(bits)bytes.push((buf<<(8-bits))&0xff);
  return btoa(String.fromCharCode(...bytes)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
function decodeGrid(n, str){
  const b64=str.replace(/-/g,'+').replace(/_/g,'/');
  const bin=atob(b64);
  const bytes=[...bin].map(c=>c.charCodeAt(0));
  const vals=[];
  for(const byte of bytes){vals.push((byte>>4)&0xf);vals.push(byte&0xf);}
  const grid=Array.from({length:n},()=>Array(n).fill(0));
  let i=0;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)grid[r][c]=vals[i++]||0;
  return grid;
}

// ── Validation ───────────────────────────────────────────────────────────────
function validate(queens, n, regions){
  const errors=new Set();
  if(!queens.length)return{errors,solved:false};
  const rowMap={},colMap={},regMap={};
  for(const q of queens){
    const key=`${q.row},${q.col}`;
    if(rowMap[q.row]!==undefined){errors.add(key);errors.add(`${q.row},${rowMap[q.row]}`);}else rowMap[q.row]=q.col;
    if(colMap[q.col]!==undefined){errors.add(key);errors.add(`${colMap[q.col]},${q.col}`);}else colMap[q.col]=q.row;
    const reg=regions[q.row][q.col];
    if(regMap[reg]!==undefined){errors.add(key);errors.add(regMap[reg]);}else regMap[reg]=key;
  }
  for(let i=0;i<queens.length;i++)for(let j=i+1;j<queens.length;j++){
    const dr=Math.abs(queens[i].row-queens[j].row),dc=Math.abs(queens[i].col-queens[j].col);
    if(dr<=1&&dc<=1&&!(dr===0&&dc===0)){errors.add(`${queens[i].row},${queens[i].col}`);errors.add(`${queens[j].row},${queens[j].col}`);}
  }
  return{errors,solved:errors.size===0&&queens.length===n};
}

  const h=loadHistory();
  const idx=h.findIndex(e=>e.id===entry.id);
  if(idx>=0)h[idx]={...h[idx],...entry};
  else h.unshift(entry);
  saveHistory(h);
};

// ── Main Component ────────────────────────────────────────────────────────────
function QueensGame(){
  const [sizeKey, setSizeKey] = useState(()=>loadExtreme()?'md':'sm');
  const [diffKey, setDiffKey] = useState(()=>loadExtreme()?'hard':'easy');
  const [puzzle, setPuzzle]   = useState(null);
  const [cells, setCells]     = useState({});
  const [errors, setErrors]   = useState(new Set());
  const [solved, setSolved]   = useState(false);
  const [showSol, setShowSol] = useState(false);
  const [timer, setTimer]     = useState(0);
  const [running, setRunning] = useState(false);
  const [hint, setHint]       = useState(null);
  const [showStats, setShowStats] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [settingsName, setSettingsName] = useState('');
  const [soundOn, setSoundOn] = useState(loadSound);
  const [hapticOn, setHapticOn] = useState(loadHaptic);
  const [extremeMode, setExtremeMode] = useState(loadExtreme);
  const [confetti, setConfetti] = useState([]);
  const [statsView, setStatsView] = useState('history'); // 'history' | 'records'
  const [stats, setStats]     = useState(loadStats);
  const [playerName, setPlayerName] = useState(loadName);
  const [namePrompt, setNamePrompt] = useState(!loadName());
  const [nameInput, setNameInput]   = useState('');

  // Challenge mode (loaded from URL)
  const [challengeMode, setChallengeMode] = useState(false);
  const [challengeReady, setChallengeReady] = useState(false); // waiting for START
  const [challengeMeta, setChallengeMeta]   = useState(null);
  const [shareModal, setShareModal] = useState(null);
  const [giveUpConfirm, setGiveUpConfirm] = useState(false);
  const [gaveUp, setGaveUp] = useState(false);
  const [viewingHistory, setViewingHistory] = useState(false);

  const draggingRef    = useRef(false);
  const dragStartRef   = useRef(null);
  const dragVisitedRef = useRef(null);
  const cellsRef       = useRef(cells);
  const historyRef     = useRef([]); // stack of previous cells states
  const audioCtxRef    = useRef(null);
  const histEntryRef   = useRef(null); // current game's history entry id
  const histScrollRef  = useRef(0);   // preserves verlauf scroll position
  useEffect(()=>{cellsRef.current=cells;},[cells]);

  const [vw, setVw] = useState(window.innerWidth);
  useEffect(()=>{const f=()=>setVw(window.innerWidth);window.addEventListener('resize',f);return()=>window.removeEventListener('resize',f);},[]);

  // Timer — pauses while a modal is open (re-renders would break modal scrolling)
  useEffect(()=>{
    if(!running||solved||showStats||showSettings||shareModal)return;
    const id=setInterval(()=>setTimer(t=>t+1),1000);
    return()=>clearInterval(id);
  },[running,solved,showStats,showSettings,shareModal]);

  // (Loading animation now uses a pure CSS crown spin — no JS interval needed)

  // Sound functions — reuse a single AudioContext to avoid the "burst of sounds" bug
  const playSound=(type)=>{
    if(!soundOn)return;
    try{
      if(!audioCtxRef.current){
        audioCtxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      }
      const ctx=audioCtxRef.current;
      // if the context got suspended (tab minimized), resume it
      if(ctx.state==='suspended'){ctx.resume();}
      const now=ctx.currentTime;
      const beep=(freq,start,dur,vol,wave)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        if(wave)o.type=wave;
        o.frequency.value=freq;
        g.gain.setValueAtTime(vol,now+start);
        g.gain.exponentialRampToValueAtTime(0.001,now+start+dur);
        o.start(now+start);o.stop(now+start+dur);
      };
      if(type==='place')beep(520,0,0.08,0.07,'sine');
      else if(type==='x')beep(300,0,0.08,0.08);
      else if(type==='ui')beep(440,0,0.1,0.06);
      else if(type==='nav'){beep(392,0,0.15,0.1,'sine');beep(587,0.07,0.15,0.1,'sine');}
      else if(type==='solve'){[523,659,784,1047].forEach((f,i)=>beep(f,i*0.1,0.2,0.15));}
    }catch{}
  };

  // Suspend audio when tab is hidden, resume when visible — prevents queued-sound burst
  useEffect(()=>{
    const onVis=()=>{
      const ctx=audioCtxRef.current;if(!ctx)return;
      if(document.hidden){try{ctx.suspend();}catch{}}
      else{try{ctx.resume();}catch{}}
    };
    document.addEventListener('visibilitychange',onVis);
    return()=>document.removeEventListener('visibilitychange',onVis);
  },[]);

  const haptic=(type)=>{
    if(!hapticOn||!navigator.vibrate)return;
    if(type==='place')navigator.vibrate(30);
    else if(type==='x')navigator.vibrate(10);
    else if(type==='solve')navigator.vibrate([50,30,50,30,100]);
  };

  const launchConfetti=()=>{
    const pieces=Array.from({length:60},(_,i)=>({
      id:i,
      x:Math.random()*100,
      delay:Math.random()*1.5,
      color:['#64b4ff','#80e080','#ffe060','#f09090','#b0a0f0','#e8c060'][i%6],
      size:6+Math.random()*7,
      rotate:Math.random()*360,
    }));
    setConfetti(pieces);
    setTimeout(()=>setConfetti([]),3500);
  };

  const newPuzzle = useCallback((sk=sizeKey, dk=diffKey, extr=extremeMode, attempt=0)=>{
    const sObj=SIZES.find(s=>s.key===sk);
    setChallengeMode(false); setChallengeReady(false); setChallengeMeta(null);
    setShowSol(false);setSolved(false);setCells({});setErrors(new Set());setHint(null);setTimer(0);
    historyRef.current=[];
    histEntryRef.current=null;
    setViewingHistory(false);
    setPuzzle(null);setRunning(false);
    // Retry if generation returns null (can happen on large/extreme boards near time limit)
    const deliver=(p)=>{
      if(p){histEntryRef.current=null;setPuzzle(p);setRunning(true);}
      else if(attempt<4){newPuzzle(sk,dk,extr,attempt+1);}
      else{/* give up gracefully: fall back to an easy puzzle of same size */
        const fb=generatePuzzle(sObj.n,'easy',false)||generatePuzzle(7,'easy',false);
        setPuzzle(fb);setRunning(true);}
    };
    const sync=()=>deliver(generatePuzzle(sObj.n,dk,extr));
    let done=false, gotReady=false;
    const finish=(p)=>{if(done)return;done=true;deliver(p);};
    const fallback=()=>{if(done)return;done=true;requestAnimationFrame(()=>requestAnimationFrame(sync));};
    let worker=null,url=null;
    try{
      const blob=new Blob([WORKER_SRC],{type:'application/javascript'});
      url=URL.createObjectURL(blob);
      worker=new Worker(url);
      const kill=()=>{try{worker.terminate();URL.revokeObjectURL(url);}catch{}};
      const readyTimer=setTimeout(()=>{if(!gotReady){kill();fallback();}},2000);
      worker.onmessage=(e)=>{
        if(e.data&&e.data.ready){gotReady=true;clearTimeout(readyTimer);return;}
        clearTimeout(readyTimer);kill();finish(e.data.puzzle);
      };
      worker.onerror=()=>{clearTimeout(readyTimer);kill();fallback();};
      worker.postMessage({n:sObj.n,diffKey:dk,extreme:extr});
    }catch(err){
      fallback();
    }
  },[sizeKey,diffKey,extremeMode]);

  // Parse URL params on mount — handles both challenge links and normal start
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const enc=p.get('c');
    const from=p.get('f')||p.get('from')||'';
    const sk=p.get('s')||p.get('sk')||'sm';
    const dk=p.get('d')||p.get('dk')||'easy';
    const bt=parseInt(p.get('t')||p.get('bt')||'0',10);
    const isExtremeChallenge=p.get('x')==='1';
    if(enc){
      const sObj=SIZES.find(s=>s.key===sk)||SIZES[0];
      const n=sObj.n;
      try{
        const regions=decodeGrid(n,enc);
        const sols=solvePuzzle(n,regions,1);
        const solution=sols.length?sols[0]:null;
        setPuzzle({n,regions,solution,score:0});
        setChallengeMode(true);
        setChallengeReady(false);
        setChallengeMeta({n,sizeKey:sk,diffKey:dk,from,bestTime:bt,isExtreme:isExtremeChallenge});
        setSizeKey(sk);setDiffKey(dk);
        return;
      }catch(e){console.error('Bad challenge link',e);}
    }
    const isExtr=loadExtreme();
    const initSk=isExtr?'md':'sm';
    const initDk=isExtr?'hard':'easy';
    newPuzzle(initSk,initDk,isExtr);
  },[]);

  const ensureHistEntry=(p,dk,cm)=>{
    if(histEntryRef.current)return histEntryRef.current;
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    const sk=SIZES.find(x=>x.n===p.n)?.key||'sm';
    const entry={
      id, ts:Date.now(), sk, dk:dk||diffKey, n:p.n,
      enc:encodeGrid(p.n,p.regions),
      status:'started', timer:0, isChallenge:!!(cm??challengeMode),
      isExtreme:!!(extremeMode&&(dk||diffKey)==='hard'),
    };
    upsertHistory(entry);
    histEntryRef.current=id;
    return id;
  };

  const recompute=(next,puz)=>{
    const p=puz||puzzle;if(!p)return;
    const queens=Object.entries(next).filter(([,v])=>v==='queen').map(([k])=>{const[r,c]=k.split(',').map(Number);return{row:r,col:c};});
    // Create history entry on first queen placed
    if(queens.length>=1)ensureHistEntry(p);
    const{errors:errs,solved:s}=validate(queens,p.n,p.regions);
    setErrors(errs);
    if(s){
      setSolved(true);setRunning(false);
      playSound('solve');haptic('solve');launchConfetti();
      // Update history entry as solved
      if(histEntryRef.current)upsertHistory({id:histEntryRef.current,status:'solved',timer,cells:JSON.stringify(next)});
      const sk2=SIZES.find(x=>x.n===p.n)?.key||sizeKey;
      const isExtremeChallenge=challengeMode&&challengeMeta?.isExtreme;
      if(!challengeMode||isExtremeChallenge){
        // use 'extreme' as key for extreme mode or extreme challenges
        const statsKey=(extremeMode||isExtremeChallenge)?`${sk2}_extreme`:`${sk2}_${diffKey}`;
        const countKey=`${statsKey}_count`;const bestKey=`${statsKey}_best`;
        setStats(prev=>{const nx={...prev};nx[countKey]=(nx[countKey]||0)+1;if(!nx[bestKey]||timer<nx[bestKey])nx[bestKey]=timer;saveStats(nx);return nx;});
      }
    }
  };

  const cycleCell=(row,col)=>{
    if(solved||showSol)return;
    if(hint)setHint(null);
    const key=`${row},${col}`;const next={...cells};
    const cur=next[key];
    if(!cur){next[key]='x';playSound('x');haptic('x');}
    else if(cur==='x'){next[key]='queen';playSound('place');haptic('place');}
    else delete next[key];
    setCells(next);recompute(next);
  };

  const paintX=(row,col)=>{
    if(solved||showSol)return;
    const key=`${row},${col}`;
    const visited=dragVisitedRef.current||new Set();
    if(visited.has(key))return;
    visited.add(key);dragVisitedRef.current=visited;
    const current=cellsRef.current;
    if(!current[key]){
      // save snapshot before each individual X so undo removes them one by one
      historyRef.current=[...historyRef.current,{...current}];
      const next={...current,[key]:'x'};
      cellsRef.current=next;setCells(next);
      playSound('x');haptic('x');
    }
  };

  const undo=()=>{
    if(!historyRef.current.length)return;
    const prev=historyRef.current[historyRef.current.length-1];
    historyRef.current=historyRef.current.slice(0,-1);
    cellsRef.current=prev;setCells(prev);setSolved(false);setErrors(new Set());setHint(null);
    recompute(prev);
    playSound('x');haptic('x');
  };

  const giveHint=()=>{
    if(solved||showSol||!puzzle)return;
    playSound('ui');haptic('x');
    const fixed={};let conflict=false;const seenRow={};
    for(const[k,v]of Object.entries(cells)){if(v!=='queen')continue;const[r,c]=k.split(',').map(Number);if(seenRow[r]!==undefined)conflict=true;seenRow[r]=c;fixed[r]=c;}
    let sols=conflict?[]:solvePuzzle(puzzle.n,puzzle.regions,80,fixed);
    if(!sols.length){
      const all=solvePuzzle(puzzle.n,puzzle.regions,80);
      let wrong=null;
      for(const[k,v]of Object.entries(cells)){if(v!=='queen')continue;const[r,c]=k.split(',').map(Number);if(!all.some(s=>s[r]===c)){wrong=k;break;}}
      setHint({type:'wrong',cell:wrong});return;
    }
    for(let r=0;r<puzzle.n;r++){const col=sols[0][r];if(sols.every(s=>s[r]===col)){const key=`${r},${col}`;if(cells[key]!=='queen'){setHint({type:'place',cell:key});return;}}}
    for(let r=0;r<puzzle.n;r++){const key=`${r},${sols[0][r]}`;if(cells[key]!=='queen'){setHint({type:'place',cell:key});return;}}
  };

  const shareChallenge=()=>{
    if(!puzzle)return;
    const sk=SIZES.find(s=>s.n===puzzle.n)?.key||sizeKey;
    const enc=encodeGrid(puzzle.n,puzzle.regions);
    const bt=solved?timer:0;
    const from=encodeURIComponent(playerName||'');
    // compact params: c=grid, s=size, d=diff, f=from, t=time, x=extreme
    let url=`${location.origin}${location.pathname}?c=${enc}&s=${sk}&d=${diffKey}`;
    if(extremeMode)url+=`&x=1`;
    if(from)url+=`&f=${from}`;
    if(bt)url+=`&t=${bt}`;
    setShareModal({url,bestTime:bt});
  };

  // ── Render helpers ────────────────────────────────────────────────────────
  const n=puzzle?.n||7;
  const maxBoard=Math.min(vw-32,520);
  const cellSize=Math.max(20,Math.floor((maxBoard-6)/n));

  // Theme: normal=blue, extreme=violet
  const T = extremeMode ? {
    bg:       'linear-gradient(135deg,#120a1e,#1a0f2e,#0f0a20)',
    bgCard:   '#130d20',
    accent:   '#b080ff',
    accentDim:'#b080ff55',
    accentRgb:'176,128,255',
    border:   '#3a2060',
    borderDim:'#2a1848',
    text:     '#c0a0e8',
    glow:     'rgba(160,100,255,0.5)',
  } : {
    bg:       'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',
    bgCard:   '#16213e',
    accent:   '#64b4ff',
    accentDim:'#64b4ff55',
    accentRgb:'100,180,255',
    border:   '#334',
    borderDim:'#223',
    text:     '#8ab4d4',
    glow:     'rgba(100,180,255,0.4)',
  };

  const btnStyle=(active,color=T.accent)=>({
    padding:'7px 14px',borderRadius:20,fontWeight:700,fontSize:14,cursor:'pointer',
    border:`2px solid ${active?color:color+'55'}`,
    background:active?`rgba(${hexRgb(color)},0.18)`:'rgba(255,255,255,0.04)',
    color:active?color:color+'99',transition:'all .2s',
  });

  function hexRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}

  // ── Name prompt overlay ───────────────────────────────────────────────────
  if(namePrompt)return(
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Segoe UI',system-ui,sans-serif",padding:24}}>
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:16,padding:'36px 40px',maxWidth:320,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:36,marginBottom:12,color:'#fff'}}>♛</div>
        <h2 style={{color:'#fff',marginBottom:8,fontSize:20}}>Willkommen!</h2>
        <p style={{color:'#667',fontSize:14,marginBottom:24}}>Wie heißt du? Dein Name erscheint in Challenge-Links.</p>
        <input value={nameInput} onChange={e=>setNameInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&nameInput.trim()){saveName(nameInput.trim());setPlayerName(nameInput.trim());setNamePrompt(false);}}}
          placeholder="Dein Name…"
          style={{width:'100%',padding:'10px 16px',borderRadius:20,border:`2px solid ${T.border}`,background:'rgba(255,255,255,0.06)',color:'#fff',fontSize:16,marginBottom:16,outline:'none'}} />
        <button onClick={()=>{if(nameInput.trim()){saveName(nameInput.trim());setPlayerName(nameInput.trim());}setNamePrompt(false);}}
          style={{width:'100%',padding:'10px',borderRadius:20,border:`2px solid ${T.accent}`,background:`rgba(${T.accentRgb},0.15)`,color:T.accent,fontWeight:700,fontSize:16,cursor:'pointer'}}>
          Los geht's
        </button>
      </div>
    </div>
  );

  // ── Challenge start screen ────────────────────────────────────────────────
  if(challengeMode&&!challengeReady&&puzzle){
    const meta=challengeMeta||{};
    const sLabel=SIZES.find(s=>s.key===meta.sizeKey)?.label||'?';
    const dLabel=meta.isExtreme?'Extrem':(DIFFS.find(d=>d.key===meta.diffKey)?.label||'?');
    return(
      <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Segoe UI',system-ui,sans-serif",padding:24}}>
        <div style={{background:'#16213e',border:'2px solid #e8c060',borderRadius:20,padding:'40px 36px',maxWidth:340,width:'100%',textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:8}}>⚔️</div>
          <h2 style={{color:'#e8c060',fontSize:22,fontWeight:800,marginBottom:4,letterSpacing:1}}>Challenge!</h2>
          <p style={{color:'#8ab4d4',fontSize:15,marginBottom:24}}>
            {meta.from?`Von: ${meta.from}`:'Jemand fordert dich heraus'}
          </p>
          <div style={{background:'rgba(255,255,255,0.04)',borderRadius:12,padding:'14px 20px',marginBottom:20}}>
            <div style={{color:'#667',fontSize:13,marginBottom:6}}>{sLabel} ({puzzle.n}×{puzzle.n}) · {dLabel}</div>
            {meta.bestTime>0
              ? <div style={{color:'#e8c060',fontSize:18,fontWeight:700}}>⏱ Zeit zu schlagen: {fmtTime(meta.bestTime)}</div>
              : <div style={{color:'#556',fontSize:15}}>Noch keine Vorgabezeit</div>}
          </div>
          <p style={{color:'#445',fontSize:12,marginBottom:24}}>Kein Tipp, keine Lösung. Stopuhr startet beim Antippen von START.</p>
          <button onClick={()=>{setChallengeReady(true);setRunning(true);}}
            style={{width:'100%',padding:'14px',borderRadius:20,border:'2px solid #e8c060',background:'rgba(232,192,96,0.15)',color:'#e8c060',fontWeight:800,fontSize:20,cursor:'pointer',letterSpacing:2}}>
            START
          </button>
        </div>
      </div>
    );
  }

  // ── Loading screen with animated 3×3 ─────────────────────────────────────
  if(!puzzle){
    const outerColors=['#A8C8E8','#A8D8A8','#F0C080','#D0A8D8','#F0A0A0','#F0E890','#A0D8D0','#F0C0A8'];
    const outerBorders=['#3A6090','#3A8040','#B07020','#8040A0','#C03030','#A89800','#208878','#B06030'];
    const positions=[[0,0],[0,1],[0,2],[1,2],[2,2],[2,1],[2,0],[1,0]];
    return(
      <div style={{minHeight:'100vh',background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:"'Segoe UI',system-ui,sans-serif",color:T.text}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,52px)',gridTemplateRows:'repeat(3,52px)',gap:4,marginBottom:24}}>
          {Array.from({length:3},(_,row)=>Array.from({length:3},(_,col)=>{
            const key=`${row},${col}`;
            const isCenter=row===1&&col===1;
            const outerIdx=positions.findIndex(([r,c])=>r===row&&c===col);
            return(
              <div key={key} style={{width:52,height:52,borderRadius:8,
                background:isCenter?`rgba(${T.accentRgb},0.15)`:outerColors[outerIdx],
                border:`2px solid ${isCenter?T.accentDim:outerBorders[outerIdx]}`,
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                {isCenter&&<span style={{fontSize:28,color:'#fff',lineHeight:1}}>♛</span>}
              </div>
            );
          }))}
        </div>
        <div style={{fontSize:14,letterSpacing:1,color:T.text}}>Generiere Feld…</div>
        {sizeKey==='lg'&&<div style={{fontSize:12,color:'#445',marginTop:6}}>Groß kann einige Sekunden dauern</div>}
      </div>
    );
  }

  // ── Share modal ───────────────────────────────────────────────────────────
  const ShareModal=()=>{
    const {url, bestTime}=shareModal;
    const [copied, setCopied]=useState(false);
    const copy=()=>{
      navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});
    };
    const nativeShare=()=>{
      const sLabel=(SIZES.find(s=>s.n===puzzle.n)?.label||'').toLowerCase();
      let desc;
      if(extremeMode){
        desc=`extremen ${puzzle.n}×${puzzle.n} Queens`;
      } else {
        const dLabel=(DIFFS.find(d=>d.key===diffKey)?.label||'').toLowerCase();
        const dAdj=dLabel==='einfach'?'einfachen':dLabel==='schwer'?'schweren':dLabel;
        desc=`${dAdj} ${puzzle.n}×${puzzle.n} Queens`;
      }
      const intro=playerName?`${playerName} fordert dich zu einem ${desc} heraus!`:`Du wirst zu einem ${desc} herausgefordert!`;
      const text=`${intro}\n\n${url}`;
      navigator.share({title:'Queens Challenge',text}).catch(()=>{});
    };
    return(
      <div onClick={()=>setShareModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:T.bgCard,border:'2px solid #e8c06066',borderRadius:16,width:'100%',maxWidth:400,padding:'28px 24px'}}>
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{fontSize:28,marginBottom:6}}>⚔️</div>
            <h2 style={{color:'#e8c060',fontSize:18,fontWeight:800,margin:0}}>Challenge teilen</h2>
            {bestTime>0&&<p style={{color:'#8ab4d4',fontSize:13,marginTop:4,marginBottom:0}}>Vorgabezeit: {fmtTime(bestTime)}</p>}
            {bestTime===0&&<p style={{color:'#556',fontSize:12,marginTop:4,marginBottom:0}}>Tipp: Löse das Puzzle zuerst, um eine Vorgabezeit mitzugeben!</p>}
          </div>
          {/* Link display */}
          <div style={{background:'rgba(0,0,0,0.3)',borderRadius:10,padding:'10px 14px',marginBottom:14,wordBreak:'break-all',fontSize:12,color:'#8ab4d4',lineHeight:1.5,border:'1px solid #334'}}>
            {url}
          </div>
          {/* Buttons */}
          <div style={{display:'flex',gap:10,flexDirection:'column'}}>
            <button onClick={copy} style={{width:'100%',padding:'11px',borderRadius:20,border:`2px solid ${copied?'#60c060':'#334'}`,background:copied?'rgba(96,192,96,0.15)':'rgba(255,255,255,0.05)',color:copied?'#80e080':'#8ab4d4',fontWeight:700,fontSize:15,cursor:'pointer'}}>
              {copied?'✓ Kopiert!':'Link kopieren'}
            </button>
            {typeof navigator.share==='function'&&(
              <button onClick={nativeShare} style={{width:'100%',padding:'11px',borderRadius:20,border:'2px solid #e8c06066',background:'rgba(232,192,96,0.12)',color:'#e8c060',fontWeight:700,fontSize:15,cursor:'pointer'}}>
                Teilen…
              </button>
            )}
            <button onClick={()=>setShareModal(null)} style={{width:'100%',padding:'9px',borderRadius:20,border:'1px solid #223',background:'none',color:'#445',fontSize:14,cursor:'pointer'}}>
              Schließen
            </button>
          </div>
        </div>
      </div>
    );
  };

  const sendRevanche = () => {
    if(!puzzle||!challengeMeta)return;
    const won = !gaveUp && challengeMeta.bestTime > 0 && timer < challengeMeta.bestTime;
    const sLabel=SIZES.find(s=>s.n===puzzle.n)?.label||'';
    const dLabel=challengeMeta.isExtreme?'Extrem':(DIFFS.find(d=>d.key===diffKey)?.label||'');
    const circPal=['🔵','🟢','🟠','🟣','🔴','🟡','🔵','🟤','🟣','🟢','🔴'];
    // build emoji grid using actual puzzle regions + solution
    let grid='';
    for(let r=0;r<puzzle.n;r++){
      for(let c=0;c<puzzle.n;c++){
        grid += puzzle.solution[r]===c ? '👑' : circPal[puzzle.regions[r][c]%circPal.length];
      }
      grid+='\n';
    }
    const header = gaveUp
      ? `⚔️ Queens (${sLabel}, ${dLabel}) — aufgegeben 🏳️`
      : won
        ? `⚔️ Queens (${sLabel}, ${dLabel}) — gelöst in ${fmtTime(timer)} 🏆 (geschlagen: ${fmtTime(challengeMeta.bestTime)})`
        : challengeMeta.bestTime>0
          ? `⚔️ Queens (${sLabel}, ${dLabel}) — gelöst in ${fmtTime(timer)} (Vorgabe: ${fmtTime(challengeMeta.bestTime)})`
          : `⚔️ Queens (${sLabel}, ${dLabel}) — gelöst in ${fmtTime(timer)}`;
    const text = `${header}\n\n${grid}`;
    if(navigator.share){navigator.share({title:'Queens',text}).catch(()=>{});}
    else{navigator.clipboard.writeText(text).then(()=>alert('Kopiert!')).catch(()=>{});}
  };
  const nameSaved = (settingsName || playerName).trim() === playerName;
  const settingsModalEl = showSettings ? (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:16,width:'100%',maxWidth:400,padding:'28px 24px'}}>
        <h2 style={{color:'#fff',fontSize:18,fontWeight:800,margin:'0 0 20px',textAlign:'center',letterSpacing:1}}>⚙️ Einstellungen</h2>

        {/* Sound */}
        <div style={{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#8ab4d4',fontSize:13,fontWeight:600}}>Sound</div>
            <div style={{color:'#445',fontSize:11,marginTop:2}}>Klick- und Lösungstöne</div>
          </div>
          <div onClick={()=>{const v=!soundOn;setSoundOn(v);saveSound(v);}}
            style={{width:48,height:26,borderRadius:13,background:soundOn?'rgba(100,180,255,0.3)':'rgba(255,255,255,0.06)',border:`2px solid ${soundOn?'#64b4ff':'#334'}`,cursor:'pointer',position:'relative',transition:'all .2s'}}>
            <div style={{position:'absolute',top:2,left:soundOn?22:2,width:18,height:18,borderRadius:'50%',background:soundOn?'#64b4ff':'#445',transition:'left .2s'}}/>
          </div>
        </div>

        {/* Haptic — only shown if device supports it */}
        {!!navigator.vibrate&&(
        <div style={{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#8ab4d4',fontSize:13,fontWeight:600}}>Haptik</div>
            <div style={{color:'#445',fontSize:11,marginTop:2}}>Vibration</div>
          </div>
          <div onClick={()=>{const v=!hapticOn;setHapticOn(v);saveHaptic(v);}}
            style={{width:48,height:26,borderRadius:13,background:hapticOn?'rgba(100,180,255,0.3)':'rgba(255,255,255,0.06)',border:`2px solid ${hapticOn?'#64b4ff':'#334'}`,cursor:'pointer',position:'relative',transition:'all .2s'}}>
            <div style={{position:'absolute',top:2,left:hapticOn?22:2,width:18,height:18,borderRadius:'50%',background:hapticOn?'#64b4ff':'#445',transition:'left .2s'}}/>
          </div>
        </div>
        )}

        {/* Extreme mode */}
        <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#b080ff',fontSize:13,fontWeight:600}}>Extrem-Modus</div>
            <div style={{color:'#445',fontSize:11,marginTop:2}}>Längere Ladezeit — nur Rätsel die Hypothesen erfordern</div>
          </div>
          <div onClick={()=>{const v=!extremeMode;setExtremeMode(v);saveExtreme(v);if(v){setSizeKey('md');setDiffKey('hard');newPuzzle('md','hard',true);}else{setSizeKey('sm');newPuzzle('sm',diffKey,false);}}}
            style={{width:48,height:26,borderRadius:13,background:extremeMode?'rgba(176,128,255,0.3)':'rgba(255,255,255,0.06)',border:`2px solid ${extremeMode?'#b080ff':'#334'}`,cursor:'pointer',position:'relative',transition:'all .2s',flexShrink:0}}>
            <div style={{position:'absolute',top:2,left:extremeMode?22:2,width:18,height:18,borderRadius:'50%',background:extremeMode?'#b080ff':'#445',transition:'left .2s'}}/>
          </div>
        </div>

        {/* Name */}
        <div style={{marginBottom:24}}>
          <div style={{color:'#8ab4d4',fontSize:13,fontWeight:600,marginBottom:8}}>Dein Name</div>
          <div style={{display:'flex',gap:8}}>
            <input
              value={settingsName}
              onChange={e=>setSettingsName(e.target.value)}
              placeholder="Name eingeben…"
              style={{flex:1,minWidth:0,padding:'8px 14px',borderRadius:20,border:'2px solid #334',background:'rgba(255,255,255,0.06)',color:'#fff',fontSize:15,outline:'none'}}
            />
            <button
              onClick={()=>{const n=settingsName.trim();if(n){saveName(n);setPlayerName(n);}}}
              disabled={nameSaved||!settingsName.trim()}
              style={{padding:'0 12px',height:38,borderRadius:20,border:`2px solid ${nameSaved?'#33444488':'#64b4ff88'}`,background:nameSaved?'rgba(255,255,255,0.03)':'rgba(100,180,255,0.12)',color:nameSaved?'#445':'#64b4ff',fontWeight:700,fontSize:12,cursor:nameSaved?'default':'pointer',transition:'all .2s',whiteSpace:'nowrap',flexShrink:0}}>
              {nameSaved?'Gespeichert':'Speichern'}
            </button>
          </div>
        </div>

        {/* Rules */}
        <div style={{color:'#8ab4d4',fontSize:13,fontWeight:600,marginBottom:10}}>Spielregeln</div>
        <div style={{background:'rgba(0,0,0,0.2)',borderRadius:12,padding:'14px 16px',color:'#8ab4d4',fontSize:13,lineHeight:1.9,marginBottom:20}}>
          <div>♛ Pro <strong style={{color:'#fff'}}>Zeile</strong>, <strong style={{color:'#fff'}}>Spalte</strong> und <strong style={{color:'#fff'}}>Farbregion</strong> genau eine Krone</div>
          <div>Zwei Kronen dürfen sich nicht berühren — auch nicht diagonal</div>
        </div>

        <button onClick={()=>setShowSettings(false)} style={{width:'100%',padding:10,borderRadius:20,border:'1px solid #334',background:'rgba(255,255,255,0.04)',color:'#556',fontSize:14,cursor:'pointer'}}>
          Schließen
        </button>
      </div>
    </div>
  ) : null;

  // ── Stats modal (Verlauf + Rekorde) ──────────────────────────────────────
  const StatsModal=()=>{
    const [hist]=useState(()=>loadHistory());
    const sizeLabel={sm:'Klein',md:'Mittel',lg:'Groß'};
    const diffLabel={easy:'Einfach',hard:'Schwer'};
    const statusLabel={solved:'✅ Gelöst',gaveUp:'🏳️ Aufgegeben',started:'⬜ Abgebrochen'};
    const PAL=['#A8C8E8','#A8D8A8','#F0C080','#D0A8D8','#F0A0A0','#F0E890','#A0D8D0','#F0C0A8','#C0C0F0','#C8E8A8','#F0C0D8'];

    const MiniGrid=({enc,n})=>{
      const regions=React.useMemo(()=>{try{return decodeGrid(n,enc);}catch{return null;}},[enc,n]);
      if(!regions)return null;
      const cell=Math.max(2,Math.min(4,Math.floor(80/n)));
      return(
        <div style={{display:'grid',gridTemplateColumns:`repeat(${n},${cell}px)`,gridTemplateRows:`repeat(${n},${cell}px)`,gap:0,borderRadius:3,overflow:'hidden',border:'1px solid #223',flexShrink:0}}>
          {Array.from({length:n},(_,r)=>Array.from({length:n},(_,c)=>{
            const reg=regions[r][c];
            return <div key={`${r},${c}`} style={{width:cell,height:cell,background:PAL[reg%PAL.length]}}/>;
          }))}
        </div>
      );
    };

    const loadPuzzleFromEntry=(entry,fresh)=>{
      setShowStats(false);
      try{
        const regions=decodeGrid(entry.n,entry.enc);
        const sol=solvePuzzle(entry.n,regions,1);
        const p={n:entry.n,regions,solution:sol[0]||[]};
        setSizeKey(entry.sk);setDiffKey(entry.dk);
        setChallengeMode(false);setChallengeReady(false);setChallengeMeta(null);
        setShowSol(false);setSolved(false);setErrors(new Set());setHint(null);setTimer(0);
        historyRef.current=[];histEntryRef.current=entry.id;
        const isSolved=entry.status==='solved';
        const savedCells=entry.cells?JSON.parse(entry.cells):{};
        setCells(fresh?{}:savedCells);
        setViewingHistory(!fresh&&isSolved);
        if(!fresh&&isSolved){setTimer(entry.timer||0);setSolved(true);setRunning(false);}
        else{setTimer(0);}
        setPuzzle(p);setRunning(!fresh&&isSolved?false:true);
      }catch(e){console.error(e);}
    };

    const tabBtn=(view,label)=>(
      <button onClick={()=>setStatsView(view)} style={{flex:1,padding:'11px 0',border:'none',background:'none',cursor:'pointer',
        fontWeight:700,fontSize:14,color:statsView===view?T.accent:'#445',
        borderBottom:statsView===view?`2px solid ${T.accent}`:'2px solid transparent'}}>
        {label}
      </button>
    );

    return(
      <div onClick={()=>setShowStats(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:16,width:'100%',maxWidth:420,overflow:'clip',maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
          <h2 style={{margin:0,padding:'18px 24px 14px',color:'#fff',fontSize:18,letterSpacing:2,textAlign:'center',flexShrink:0}}>♛ Statistik</h2>

          {/* Two main tabs */}
          <div style={{display:'flex',flexShrink:0}}>
            {tabBtn('history','🕐 Verlauf')}
            {tabBtn('records','🏆 Rekorde')}
          </div>

          <div className="smooth-scroll" style={{flex:1}}
            ref={el=>{
              if(el&&statsView==='history'&&!el.dataset.scrollInit){
                el.dataset.scrollInit='1';
                el.scrollTop=histScrollRef.current;
              }
            }}
            onScroll={e=>{if(statsView==='history')histScrollRef.current=e.currentTarget.scrollTop;}}>
            {statsView==='records'?(
              <div style={{padding:'8px 0'}}>
                {SIZES.map(s=>(
                  <div key={s.key}>
                    <div style={{padding:'10px 20px 4px',color:T.accent,fontWeight:700,fontSize:13,letterSpacing:1}}>{s.label} ({s.n}×{s.n})</div>
                    {DIFFS.map(d=>{
                      const countKey=`${s.key}_${d.key}_count`;const bestKey=`${s.key}_${d.key}_best`;
                      const count=stats[countKey]||0;const best=stats[bestKey];
                      return(
                        <div key={d.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 24px'}}>
                          <div style={{color:'#8ab4d4',fontSize:14}}>{d.label}</div>
                          <div style={{textAlign:'right'}}>
                            <div style={{color:count>0?'#fff':'#334',fontSize:13}}>{count>0?`${count}× gelöst`:'—'}</div>
                            {best!==undefined&&<div style={{color:'#ffe060',fontSize:12}}>⏱ {fmtTime(best)}</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
                {/* Extrem section — only shown if at least one extreme puzzle solved */}
                {(()=>{
                  const extremeSizes=SIZES.filter(s=>s.key!=='sm'&&(stats[`${s.key}_extreme_count`]||0)>0);
                  if(!extremeSizes.length)return null;
                  return(
                    <div>
                      <div style={{height:1,background:'#b080ff44',margin:'8px 0'}}/>
                      <div style={{padding:'10px 20px 4px',color:'#b080ff',fontWeight:700,fontSize:13,letterSpacing:1}}>Extrem</div>
                      {extremeSizes.map(s=>{
                        const count=stats[`${s.key}_extreme_count`]||0;
                        const best=stats[`${s.key}_extreme_best`];
                        return(
                          <div key={s.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 24px'}}>
                            <div style={{color:'#b080ff',fontSize:14}}>{s.label}</div>
                            <div style={{textAlign:'right'}}>
                              <div style={{color:'#fff',fontSize:13}}>{count}× gelöst</div>
                              {best!==undefined&&<div style={{color:'#ffe060',fontSize:12}}>⏱ {fmtTime(best)}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>
            ):(
              <div>
                {hist.length===0?(
                  <div style={{padding:32,textAlign:'center',color:'#445',fontSize:14}}>Noch keine Partien gespeichert.<br/>Setze mindestens eine Krone!</div>
                ):hist.map(entry=>{
                  const d=new Date(entry.ts);
                  const dateStr=d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
                  const timeStr=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
                  return(
                    <div key={entry.id} style={{padding:'14px 16px'}}>
                      <div style={{display:'flex',gap:12,alignItems:'center'}}>
                        <MiniGrid enc={entry.enc} n={entry.n}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                            <span style={{color:'#fff',fontWeight:700,fontSize:13}}>{sizeLabel[entry.sk]||entry.sk}{entry.isExtreme?'':`, ${diffLabel[entry.dk]||entry.dk}`}</span>
                            {entry.isExtreme&&<span style={{fontSize:10,fontWeight:700,letterSpacing:1,color:'#b080ff',background:'rgba(160,100,255,0.15)',border:'1px solid #b080ff55',borderRadius:4,padding:'1px 5px'}}>EXTREM</span>}
                            {entry.isChallenge&&<span style={{fontSize:11,color:'#f09090'}}>⚔️</span>}
                          </div>
                          <div style={{color:'#556',fontSize:11,marginTop:2}}>{dateStr} · {timeStr}</div>
                          <div style={{display:'flex',gap:8,marginTop:3,alignItems:'center'}}>
                            <span style={{fontSize:12,color:entry.status==='solved'?'#80e080':entry.status==='gaveUp'?'#f09090':'#445'}}>
                              {statusLabel[entry.status]||'—'}
                            </span>
                            {entry.timer>0&&<span style={{fontSize:12,color:'#ffe060'}}>⏱ {fmtTime(entry.timer)}</span>}
                          </div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:8,marginTop:10}}>
                        <button onClick={()=>loadPuzzleFromEntry(entry,false)} style={{flex:1,padding:'7px 0',borderRadius:10,border:'1px solid #4488cc66',background:'rgba(68,136,204,0.12)',color:'#64b4ff',fontSize:12,cursor:'pointer',fontWeight:600}}>
                          {entry.status==='solved'?'Lösung ansehen':'Fortsetzen'}
                        </button>
                        <button onClick={()=>loadPuzzleFromEntry(entry,true)} style={{flex:1,padding:'7px 0',borderRadius:10,border:'1px solid #44664466',background:'rgba(80,160,80,0.1)',color:'#80d080',fontSize:12,cursor:'pointer',fontWeight:600}}>
                          Neu starten
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{padding:'14px 20px',flexShrink:0}}>
            <button onClick={()=>setShowStats(false)} style={{width:'100%',padding:10,borderRadius:20,border:'1px solid #334',background:'rgba(255,255,255,0.04)',color:'#556',fontSize:14,cursor:'pointer'}}>
              Schließen
            </button>
          </div>
        </div>
      </div>
    );
  };

  const {regions,solution}=puzzle;

  return(
    <div style={{minHeight:'100vh',
      background: challengeMode
        ? 'linear-gradient(135deg,#1a0a0a,#2d0f0f,#1a0a0a)'
        : T.bg,
      display:'flex',flexDirection:'column',alignItems:'center',paddingTop:20,paddingBottom:40,paddingLeft:16,paddingRight:16,boxSizing:'border-box',fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {showStats&&<StatsModal/>}
      {shareModal&&<ShareModal/>}
      {settingsModalEl}

      {/* Confetti */}
      {confetti.length>0&&(
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:200,overflow:'hidden'}}>
          {confetti.map(p=>(
            <div key={p.id} style={{
              position:'absolute',left:`${p.x}%`,top:'-20px',
              width:p.size,height:p.size,borderRadius:p.size*0.2,
              background:p.color,
              animation:`confettiFall 1.2s ${p.delay}s linear forwards`,
              opacity:0,
            }}/>
          ))}
          <style>{`@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:1;}}`}</style>
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,marginBottom:14,position:'relative',width:'100%'}}>
        {!challengeMode&&<button onClick={()=>setShowStats(true)} style={{position:'absolute',left:0,height:36,padding:'0 12px',borderRadius:10,border:`2px solid ${T.border}`,background:`rgba(${T.accentRgb},0.06)`,color:T.text,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>📊</button>}
        <h1 style={{margin:0,fontSize:30,fontWeight:800,letterSpacing:3,color:'#fff',textShadow:challengeMode?'0 0 30px rgba(255,80,80,0.5)':`0 0 30px ${T.glow}`}}>
          {challengeMode?'⚔️ CHALLENGE ⚔️':'♛ QUEENS'}
        </h1>
        {!challengeMode&&<button onClick={()=>{setSettingsName(playerName);setShowSettings(true);}} style={{position:'absolute',right:0,height:36,padding:'0 12px',borderRadius:10,border:`2px solid ${T.border}`,background:`rgba(${T.accentRgb},0.06)`,color:T.text,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>⚙️</button>}
      </div>

      {/* Size + Difficulty selectors — normal mode only */}
      {!challengeMode&&(
        <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center',marginBottom:14}}>
          <div style={{display:'flex',gap:8}}>
            {SIZES.filter(s=>!(extremeMode&&s.key==='sm')).map(s=>(
              <button key={s.key} onClick={()=>{playSound('nav');setSizeKey(s.key);newPuzzle(s.key,diffKey);}} style={btnStyle(sizeKey===s.key,T.accent)}>
                {s.label}<br/><span style={{fontSize:10,fontWeight:400,opacity:0.6}}>{s.n}×{s.n}</span>
              </button>
            ))}
          </div>
          {!extremeMode&&<div style={{display:'flex',gap:8}}>
            {DIFFS.map(d=>(
              <button key={d.key} onClick={()=>{playSound('nav');setDiffKey(d.key);newPuzzle(sizeKey,d.key);}} style={btnStyle(diffKey===d.key,T.accent)}>
                {d.label}
              </button>
            ))}
          </div>}
        </div>
      )}

      {/* Challenge meta banner */}
      {challengeMode&&challengeMeta&&(
        <div style={{marginBottom:4,padding:'8px 20px',borderRadius:12,background:'rgba(232,192,96,0.18)',border:'1px solid #e8c06099',textAlign:'center'}}>
          <div style={{color:'#c0a060',fontSize:12}}>{SIZES.find(s=>s.key===challengeMeta.sizeKey)?.label} · {challengeMeta.isExtreme?'Extrem':DIFFS.find(d=>d.key===challengeMeta.diffKey)?.label}</div>
          {challengeMeta.bestTime>0&&<div style={{color:'#ffd870',fontSize:14,fontWeight:700}}>⏱ Zu schlagen: {fmtTime(challengeMeta.bestTime)}</div>}
        </div>
      )}

      {/* Grid wrapper */}
      <div style={{position:'relative',width:Math.min(vw-32,520)+'px',maxWidth:'100%',marginTop:challengeMode?6:16}}>

        {/* Timer row — centered in challenge, left+right in normal */}
        {challengeMode ? (
          <div style={{display:'flex',justifyContent:'center',gap:12,alignItems:'center',marginBottom:8}}>
            <div style={{height:32,padding:'0 12px',borderRadius:16,border:'2px solid #c0404044',background:'rgba(192,64,64,0.1)',display:'flex',alignItems:'center',fontVariantNumeric:'tabular-nums',color:solved?'#80e080':'#ff9090',fontWeight:700,fontSize:15}}>
              ⏱ {fmtTime(timer)}
            </div>
            <div style={{height:32,padding:'0 12px',borderRadius:16,border:'2px solid #66334444',background:'rgba(255,255,255,0.04)',display:'flex',alignItems:'center',color:'#c09090',fontSize:14,fontWeight:600}}>
              {Object.values(cells).filter(v=>v==='queen').length} / {n} ♛
            </div>
          </div>
        ) : (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{height:32,padding:'0 12px',borderRadius:16,border:'2px solid #64b4ff44',background:'rgba(100,180,255,0.08)',display:'flex',alignItems:'center',fontVariantNumeric:'tabular-nums',color:solved?'#80e080':'#64b4ff',fontWeight:700,fontSize:15}}>
                ⏱ {fmtTime(timer)}
              </div>
              <div style={{height:32,padding:'0 12px',borderRadius:16,border:'2px solid #44444466',background:'rgba(255,255,255,0.04)',display:'flex',alignItems:'center',color:'#8ab4d4',fontSize:14,fontWeight:600}}>
                {Object.values(cells).filter(v=>v==='queen').length} / {n} ♛
              </div>
            </div>
            <button onClick={()=>{playSound('nav');shareChallenge();}} style={{height:32,padding:'0 12px',borderRadius:16,border:'2px solid #e8c06088',background:'rgba(232,192,96,0.15)',color:'#e8c060',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>⚔️ Herausfordern</button>
          </div>
        )}

        {solved&&(
          <div style={{marginBottom:8,padding:'10px 20px',borderRadius:12,
            background: gaveUp?'rgba(180,60,60,0.15)':'rgba(80,200,80,0.15)',
            border: gaveUp?'2px solid #c04040':'2px solid #60c060',
            color: gaveUp?'#f09090':'#80e080',
            fontWeight:800,fontSize:17,letterSpacing:2,textAlign:'center'}}>
            {gaveUp?'🏳️ Aufgegeben':'🎉 Gelöst!'} {!gaveUp&&fmtTime(timer)}
            {!challengeMode&&!gaveUp&&!viewingHistory&&(()=>{const sk2=SIZES.find(x=>x.n===puzzle.n)?.key||sizeKey;const best=stats[`${sk2}_${diffKey}_best`];return best===timer&&(stats[`${sk2}_${diffKey}_count`]||0)<=1?<div style={{fontSize:13,color:'#a0f0a0',marginTop:4}}>Erster Rekord! ⭐</div>:best===timer?<div style={{fontSize:13,color:'#ffe060',marginTop:4}}>🏆 Neuer Rekord!</div>:<div style={{fontSize:13,color:'#60a060',marginTop:4}}>Bestzeit: {fmtTime(best)}</div>;})()}
            {challengeMode&&(
              <>
                {!gaveUp&&challengeMeta?.bestTime>0&&(timer<challengeMeta.bestTime
                  ?<div style={{fontSize:13,color:'#ffe060',marginTop:4}}>🏆 Challenge geschlagen! (Vorgabe: {fmtTime(challengeMeta.bestTime)})</div>
                  :<div style={{fontSize:13,color:'#f09090',marginTop:4}}>Knapp! Vorgabe war {fmtTime(challengeMeta.bestTime)}</div>
                )}
                <button onClick={sendRevanche} style={{marginTop:10,padding:'8px 20px',borderRadius:20,border:'2px solid #e8c06088',background:'rgba(232,192,96,0.15)',color:'#e8c060',fontWeight:700,fontSize:14,cursor:'pointer'}}>
                  ⚔️ Ergebnis teilen
                </button>
              </>
            )}
          </div>
        )}

        <div style={{display:'grid',gridTemplateColumns:`repeat(${n},${cellSize}px)`,gridTemplateRows:`repeat(${n},${cellSize}px)`,gap:0,borderRadius:10,overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,0.6)',border:'3px solid #334',touchAction:'none',userSelect:'none',WebkitUserSelect:'none',WebkitTouchCallout:'none'}}
          onPointerDown={e=>{
          if(solved||showSol)return;
          const cell=e.target.closest('[data-cell]');if(!cell)return;
          const[row,col]=cell.dataset.cell.split(',').map(Number);
          // pre-snapshot for tap; if it becomes a swipe, paintX pushes per-cell snapshots
          // and we pop this one off in onPointerMove when moved=false→true
          historyRef.current=[...historyRef.current,{...cellsRef.current}];
          draggingRef.current=true;
          dragVisitedRef.current=new Set();
          dragStartRef.current={row,col,moved:false,x:e.clientX,y:e.clientY,snapLen:historyRef.current.length};
          try{e.currentTarget.setPointerCapture(e.pointerId);}catch{}
        }}
        onPointerMove={e=>{
          if(!draggingRef.current||solved||showSol)return;
          const start=dragStartRef.current;if(!start)return;
          const el=document.elementFromPoint(e.clientX,e.clientY);
          const cell=el&&el.closest&&el.closest('[data-cell]');if(!cell)return;
          const[row,col]=cell.dataset.cell.split(',').map(Number);
          const far=Math.abs(e.clientX-start.x)>6||Math.abs(e.clientY-start.y)>6;
          if(row!==start.row||col!==start.col||far){
            if(!start.moved){
              // becoming a swipe — remove the tap pre-snapshot, paintX will manage its own
              historyRef.current=historyRef.current.slice(0,start.snapLen-1);
              start.moved=true;
              paintX(start.row,start.col);
            }
            paintX(row,col);
          }
        }}
        onPointerUp={()=>{
          const start=dragStartRef.current;
          if(start&&!start.moved)cycleCell(start.row,start.col);
          else if(start&&start.moved)recompute(cellsRef.current);
          draggingRef.current=false;dragVisitedRef.current=null;dragStartRef.current=null;
        }}
        onPointerCancel={()=>{
          const start=dragStartRef.current;
          if(start&&start.moved)recompute(cellsRef.current);
          draggingRef.current=false;dragVisitedRef.current=null;dragStartRef.current=null;
        }}
      >
        {Array.from({length:n},(_,row)=>Array.from({length:n},(_,col)=>{
          const key=`${row},${col}`;
          const ri=regions[row][col];
          const pal=PAL[ri%PAL.length];
          const state=cells[key];
          const isSol=showSol&&solution[row]===col;
          const isErr=errors.has(key);
          const isHP=hint?.type==='place'&&hint.cell===key;
          const isHW=hint?.type==='wrong'&&hint.cell===key;
          const bTop=row===0||regions[row-1][col]!==ri?`2.5px solid ${pal.border}`:`1px solid ${pal.border}44`;
          const bLeft=col===0||regions[row][col-1]!==ri?`2.5px solid ${pal.border}`:`1px solid ${pal.border}44`;
          const bBot=row===n-1||regions[row+1][col]!==ri?`2.5px solid ${pal.border}`:`1px solid ${pal.border}44`;
          const bRight=col===n-1||regions[row][col+1]!==ri?`2.5px solid ${pal.border}`:`1px solid ${pal.border}44`;
          return(
            <div key={key} data-cell={key} style={{width:cellSize,height:cellSize,
              background:isErr?'rgba(220,60,60,0.35)':isHP?'rgba(232,200,96,0.55)':isSol?`${pal.bg}cc`:pal.bg,
              borderTop:bTop,borderLeft:bLeft,borderBottom:bBot,borderRight:bRight,
              display:'flex',alignItems:'center',justifyContent:'center',
              cursor:solved||showSol?'default':'pointer',
              position:'relative',boxSizing:'border-box',userSelect:'none',WebkitUserSelect:'none',WebkitTouchCallout:'none',touchAction:'none',
              boxShadow:isHP?'inset 0 0 0 3px #e8c060,0 0 14px rgba(232,200,96,0.7)':isHW?'inset 0 0 0 3px #ff5050,0 0 14px rgba(255,80,80,0.7)':'none',
              zIndex:isHP||isHW?2:1}}>
              {(state==='queen'||isSol)&&<span style={{fontSize:cellSize*0.75,lineHeight:1,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',position:'absolute',top:'-1px',left:0,color:isErr?'#ff4444':isSol?pal.queen+'99':pal.queen,filter:isErr?'drop-shadow(0 0 4px #ff2222)':'drop-shadow(0 0 5px rgba(255,255,255,0.55))'}}>♛</span>}
              {state==='x'&&!isSol&&<span style={{fontSize:cellSize*0.72,lineHeight:1,color:pal.border,opacity:0.9,fontWeight:900,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',position:'absolute',top:'-1px',left:0}}>✕</span>}
            </div>
          );
        }))}
        </div>
      </div>{/* end grid wrapper */}

      {/* Bottom controls */}
      {challengeMode ? (
        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:14,width:Math.min(vw-32,520)+'px',maxWidth:'100%'}}>
          {/* Zurücksetzen + ↩ side by side, full width */}
          <div style={{display:'flex',gap:8}}>
            {(()=>{const hasAnything=Object.keys(cells).length>0;return(
              <button onClick={()=>{historyRef.current=[];setCells({});setErrors(new Set());setHint(null);setSolved(false);setRunning(true);setGiveUpConfirm(false);setGaveUp(false);}}
                disabled={!hasAnything}
                style={{flex:1,height:40,borderRadius:16,fontWeight:700,fontSize:14,cursor:hasAnything?'pointer':'default',border:'2px solid #c06060',background:'rgba(160,70,70,0.35)',color:'#ffc0c0',opacity:hasAnything?1:0.4}}>
                Zurücksetzen
              </button>
            );})()}
            <button onClick={undo} disabled={!historyRef.current.length}
              style={{flex:1,height:40,borderRadius:16,fontWeight:700,fontSize:18,cursor:historyRef.current.length?'pointer':'default',border:'2px solid #8878b0',background:'rgba(120,100,160,0.35)',color:'#d0c0f0',opacity:historyRef.current.length?1:0.4}}>
              ↩
            </button>
          </div>
          {/* Aufgeben — full width, double tap */}
          {!solved&&(
            <button
              onClick={()=>{if(giveUpConfirm){setShowSol(true);setRunning(false);setGaveUp(true);setSolved(true);setGiveUpConfirm(false);if(histEntryRef.current)upsertHistory({id:histEntryRef.current,status:'gaveUp',timer});}else{setGiveUpConfirm(true);setTimeout(()=>setGiveUpConfirm(false),3000);}}}
              style={{width:'100%',height:40,borderRadius:16,fontWeight:700,fontSize:14,cursor:'pointer',
                border:`2px solid ${giveUpConfirm?'#ff6060':'#c04040'}`,
                background:giveUpConfirm?'rgba(255,80,80,0.4)':'rgba(180,50,50,0.3)',
                color:giveUpConfirm?'#fff':'#ffb0b0',transition:'all .2s'}}>
              {giveUpConfirm?'Sicher? (nochmal tippen)':'Aufgeben'}
            </button>
          )}
        </div>
      ) : (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,width:Math.min(vw-32,520)+'px',maxWidth:'100%'}}>
          <div style={{display:'flex',gap:8}}>
            <button onClick={giveHint} disabled={solved||showSol}
              style={{height:32,padding:'0 14px',borderRadius:16,fontWeight:700,fontSize:18,cursor:solved||showSol?'default':'pointer',border:'2px solid #e8c06088',background:'rgba(232,192,96,0.15)',color:'#e8c060',opacity:solved||showSol?0.3:1}}>
              💡
            </button>
            <button onClick={()=>setShowSol(s=>!s)}
              style={{height:32,padding:'0 14px',borderRadius:16,fontWeight:700,fontSize:14,cursor:'pointer',border:`2px solid ${showSol?'#c04040':'#90a8f088'}`,background:showSol?'rgba(192,64,64,0.18)':'rgba(144,168,240,0.12)',color:showSol?'#f09090':'#90a8f0'}}>
              {showSol?'Verbergen':'Lösung'}
            </button>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {(()=>{const hasAnything=Object.keys(cells).length>0;return(
              <button onClick={()=>{historyRef.current=[];setCells({});setErrors(new Set());setHint(null);setSolved(false);setRunning(true);}}
                disabled={!hasAnything}
                style={{height:32,padding:'0 14px',borderRadius:16,fontWeight:700,fontSize:14,cursor:hasAnything?'pointer':'default',border:'2px solid #d0808088',background:'rgba(208,128,128,0.12)',color:'#d08080',opacity:hasAnything?1:0.3}}>
                Zurücksetzen
              </button>
            );})()}
            <button onClick={undo} disabled={!historyRef.current.length}
              style={{height:32,padding:'0 14px',borderRadius:16,fontWeight:700,fontSize:18,cursor:historyRef.current.length?'pointer':'default',border:'2px solid #8ab4d488',background:'rgba(138,180,212,0.12)',color:'#8ab4d4',opacity:historyRef.current.length?1:0.3}}>
              ↩
            </button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<QueensGame/>);
</script>
</body>
</html>
